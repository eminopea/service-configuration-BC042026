booking:
  property: Gateway Profile Dev Profile

server:
  port: 8080

spring:
  application:
    name: ms-api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        - id: ms-auth
          uri: http://localhost:7081
          predicates:
            - Path=/auth/**

        - id: ms-customer
          uri: http://localhost:7082
          predicates:
            - Path=/customer/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

jwt:
  secret: myVerySecretKeyForJwtAuthentication123456789
  expiration: 3600000